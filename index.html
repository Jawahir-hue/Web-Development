<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model and Display Property</title>

<link rel="stylesheet" href="style.css">
<style>
    body{
        background-color: rgb(250, 196, 95);
    }
</style>
</head>

<body>

<h1>CSS Box Model Example</h1>

<div class="box">
This box shows the CSS Box Model:
Content + Padding + Border + Margin
</div>


<h1>CSS Display Property Example</h1>

<div class="block">This is Block Display</div>

<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<div class="inline-block">Inline Block 1</div>
<div class="inline-block">Inline Block 2</div>

</body>
</html>
